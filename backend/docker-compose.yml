services:

  postgres:

    image: postgres:17

    container_name: hireflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - hireflow-network

  backend:

    build:
      context: .

    image: hireflow-backend

    container_name: hireflow-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:

      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      DDL_AUTO: ${DDL_AUTO}
      SHOW_SQL: ${SHOW_SQL}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}

      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}

      FILE_STORAGE_BASE_PATH: ${FILE_STORAGE_BASE_PATH}

      SECURITY_LOG_LEVEL: ${SECURITY_LOG_LEVEL}
      HIBERNATE_SQL_LOG_LEVEL: ${HIBERNATE_SQL_LOG_LEVEL}

    ports:
      - "8081:8081"

    volumes:
      - uploads-data:/app/uploads

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    networks:
      - hireflow-network

volumes:

  postgres-data:

  uploads-data:

networks:

  hireflow-network: