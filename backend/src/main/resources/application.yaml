server:
  port: 8081

spring:
  application:
    name: hireflow

  datasource:
    url: jdbc:postgresql://localhost:5432/hireflow_db
    username: postgres
    password: Qwerty123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

jwt:
  secret: 9f6b3c4e2a8d1f7b5c9e4a6d8f1b3c7e5a9d2f6b8c1e4a7d
  expiration: 86400000
  refresh-expiration: 604800000
  password-reset-expiration: 900000

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:no-reply@hireflow.com}
    from-name: HireFlow
  file:
    base-path: ${FILE_STORAGE_BASE_PATH:uploads}
    base-url: /api/files/serve
    max-size:
      resume: 5242880   # 5 MB
      image: 2097152    # 2 MB
    allowed-extensions:
      resume: pdf,doc,docx
      image: jpg,jpeg,png,webp

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
    doc-expansion: none